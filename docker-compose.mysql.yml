services:
  mysql:
    image: mysql:8.0
    container_name: onlineschoolmultitenant-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=onlineschoolmultitenant # This is your Laravel DB
      - MYSQL_USER=onlineschoolmultitenant
      - MYSQL_PASSWORD=onlineschoolmultitenant_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - onlineschoolmultitenant_mysql_data:/var/lib/mysql
      # THIS LINE creates the keycloak_db automatically
      - ./docker/mysql/init:/docker-entrypoint-initdb.d 
    networks:
      - onlineschoolmultitenant-mysql-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: onlineschoolmultitenant-keycloak
    command: start-dev
    environment:
      - KC_DB=mysql
      # CHANGED: Now points to keycloak_db instead of onlineschoolmultitenant
      - KC_DB_URL=jdbc:mysql://mysql:3306/keycloak_db 
      - KC_DB_USERNAME=onlineschoolmultitenant
      - KC_DB_PASSWORD=onlineschoolmultitenant_password
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    ports:
      - "8083:8080"
    depends_on:
      - mysql
    networks:
      - onlineschoolmultitenant-mysql-network

  redis:
    image: redis:7-alpine
    container_name: onlineschoolmultitenant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - onlineschoolmultitenant_redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - onlineschoolmultitenant-mysql-network

volumes:
  onlineschoolmultitenant_mysql_data:
  onlineschoolmultitenant_redis_data:

networks:
  onlineschoolmultitenant-mysql-network:
    driver: bridge

